name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-backend:
    name: Build & Test Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore, build & test
        run: dotnet test -c Release --verbosity normal
        working-directory: RecruitSaas-backend/Recrutement-api.Tests
        env:
          APPLY_MIGRATIONS: "false"

  build-frontend:
    name: Build Frontend (Vue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: RecruitSaas-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: RecruitSaas-frontend

      - name: Build
        run: npm run build
        working-directory: RecruitSaas-frontend
        env:
          VITE_API_ORIGIN: http://localhost:5202

  build-ai:
    name: Build & Test AI Service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            recruit-ai-service/requirements.txt
            recruit-ai-service/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
        working-directory: recruit-ai-service

      - name: Run tests
        run: pytest tests/ -v
        working-directory: recruit-ai-service
        env:
          GROQ_API_KEY: test-key-for-ci

  docker-build:
    name: Docker Build (all services)
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-ai]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t recruitsaas-backend:ci ./RecruitSaas-backend/Recrutement-api

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_ORIGIN=http://localhost:5202 \
            -t recruitsaas-frontend:ci \
            ./RecruitSaas-frontend

      - name: Build AI service image
        run: docker build -t recruitsaas-ai:ci ./recruit-ai-service
