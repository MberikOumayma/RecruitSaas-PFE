name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    name: Build & Test Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore, build & test with coverage
        run: dotnet test -c Release --verbosity normal
        working-directory: RecruitSaas-backend/Recrutement-api.Tests
        env:
          APPLY_MIGRATIONS: "false"

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: RecruitSaas-backend/Recrutement-api.Tests/coverage/
          if-no-files-found: ignore

  build-frontend:
    name: Lint & Build Frontend (Vue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: RecruitSaas-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: RecruitSaas-frontend

      - name: Lint
        run: npm run lint
        working-directory: RecruitSaas-frontend

      - name: Build
        run: npm run build
        working-directory: RecruitSaas-frontend
        env:
          VITE_API_ORIGIN: http://localhost:5202

  build-ai:
    name: Build & Test AI Service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            recruit-ai-service/requirements.txt
            recruit-ai-service/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
        working-directory: recruit-ai-service

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
        working-directory: recruit-ai-service
        env:
          GROQ_API_KEY: test-key-for-ci

      - name: Upload AI coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-ai
          path: recruit-ai-service/coverage.xml
          if-no-files-found: ignore

  integration:
    name: Integration (multi-services)
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-ai]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Run docker compose integration smoke tests
        run: bash .github/scripts/ci-integration.sh

  docker-build:
    name: Docker Build & Push (GHCR)
    runs-on: ubuntu-latest
    needs: [integration]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image namespace
        id: image-ns
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./RecruitSaas-backend/Recrutement-api
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-ns.outputs.value }}/recruitsaas-backend:latest
            ${{ env.REGISTRY }}/${{ steps.image-ns.outputs.value }}/recruitsaas-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./RecruitSaas-frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          build-args: |
            VITE_API_ORIGIN=http://localhost:5202
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-ns.outputs.value }}/recruitsaas-frontend:latest
            ${{ env.REGISTRY }}/${{ steps.image-ns.outputs.value }}/recruitsaas-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push AI service image
        uses: docker/build-push-action@v6
        with:
          context: ./recruit-ai-service
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-ns.outputs.value }}/recruitsaas-ai:latest
            ${{ env.REGISTRY }}/${{ steps.image-ns.outputs.value }}/recruitsaas-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Published images summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          NS="${{ steps.image-ns.outputs.value }}"
          echo "## Images publiées sur GHCR" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Image |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend | \`ghcr.io/${NS}/recruitsaas-backend:latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | \`ghcr.io/${NS}/recruitsaas-frontend:latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service IA | \`ghcr.io/${NS}/recruitsaas-ai:latest\` |" >> "$GITHUB_STEP_SUMMARY"
